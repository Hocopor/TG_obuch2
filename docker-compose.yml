services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tg_bot
      POSTGRES_USER: tg_bot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tg_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      admin:
        condition: service_started
    volumes:
      - ./shared:/app/shared
      - ./files:/app/files
    restart: always

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./shared:/app/shared
      - ./files:/app/files
      - ./uploads:/app/uploads
    restart: always

volumes:
  pgdata:
